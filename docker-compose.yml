version: "3.9"

services:
  akanji:
    build: .
    container_name: akanji
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db:/opt/akanji/db
      - ./logs:/opt/akanji/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: schedule periodic /sync via cron
